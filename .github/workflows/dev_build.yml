name: Publish Development Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      # ESTO ES LO QUE HACE QUE APAREZCA EN EL SUMMARY
      - name: Upload Artifact to Summary
        uses: actions/upload-artifact@v4
        with:
          name: xA Addon 1.21- 1.21.11
          path: build/libs/*.jar
          retention-days: 5

      # Mantenemos esto por si quieres versiones permanentes
      - name: Release
        uses: softprops/action-gh-release@v2
        overwrite: true
        if: startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: snapshot
          name: Dev Build
          prerelease: true
          files: build/libs/*.jar
          
