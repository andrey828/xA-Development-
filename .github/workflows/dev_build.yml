name: Publish Development Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      # Este paso siempre funciona para descargar el jar manualmente
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xA-Addon-Build
          path: build/libs/*.jar

      # Actualizar la Release borrando la anterior primero
      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Intentar borrar la release existente (si no existe, no pasa nada)
          gh release delete snapshot --yes || true
          
          # 2. Intentar borrar el tag remoto (si no existe, no pasa nada)
          git push origin :refs/tags/snapshot || true
          
          # 3. Crear la release desde cero con el archivo nuevo
          gh release create snapshot build/libs/*.jar \
            --title "Dev Build" \
            --notes "Compilación automática de xAddon" \
            --prerelease
            
