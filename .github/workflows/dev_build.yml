name: Publish Development Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      # Este paso te permite descargar el jar desde la pestaña Actions -> Summary
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xA-Addon-Build
          path: build/libs/*.jar

      # Crear la release usando el CLI oficial de GitHub (más robusto)
      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Borra el tag local y remoto si ya existen para "resetear" la release
          git tag -d snapshot || true
          git push origin :refs/tags/snapshot || true
          
          # Usa el comando oficial de GitHub para crear la release y subir los archivos
          # --clobber sobreescribe archivos si ya existen
          gh release create snapshot build/libs/*.jar \
            --title "Dev Build" \
            --notes "Compilación automática de xAddon" \
            --prerelease \
            --generate-notes \
            --clobber
            
